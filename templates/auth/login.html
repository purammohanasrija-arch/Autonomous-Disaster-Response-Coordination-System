{% extends 'base.html' %}
{% block title %}Login – Disaster Response{% endblock %}
{% block auth_content %}
<div class="card shadow-lg auth-card">
  <div class="card-body p-5">
    <div class="text-center mb-4">
      <i class="bi bi-shield-exclamation text-danger" style="font-size:3rem;"></i>
      <h3 class="fw-bold mt-2">Disaster Response System</h3>
      <p class="text-muted">Sign in to your account</p>
    </div>
    <form method="POST">
      <div class="mb-3">
        <label class="form-label fw-semibold">Username</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" name="username" class="form-control" placeholder="Enter username" required />
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" class="form-control" placeholder="Enter password" required />
        </div>
      </div>
      <button type="submit" class="btn btn-danger w-100 fw-bold py-2">
        <i class="bi bi-box-arrow-in-right me-2"></i>Login &amp; Get OTP
      </button>
    </form>
    <hr />
    <p class="text-center mb-0">
      Don't have an account?
      <a href="{{ url_for('auth.register') }}" class="text-danger fw-semibold">Register</a>
    </p>
  </div>
</div>
{% endblock %}
