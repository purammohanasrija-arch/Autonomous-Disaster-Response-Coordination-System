{% extends 'base.html' %}
{% block title %}Register{% endblock %}
{% block auth_content %}
<div class="card shadow-lg auth-card" style="max-width:480px;">
  <div class="card-body p-5">
    <div class="text-center mb-4">
      <i class="bi bi-person-plus text-danger" style="font-size:3rem;"></i>
      <h3 class="fw-bold mt-2">Create Account</h3>
    </div>
    <form method="POST">
      <div class="mb-3">
        <label class="form-label fw-semibold">Username</label>
        <input type="text" name="username" class="form-control" required />
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Email</label>
        <input type="email" name="email" class="form-control" required />
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Phone</label>
        <input type="tel" name="phone" class="form-control" placeholder="+1234567890" />
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Password</label>
        <input type="password" name="password" class="form-control" required />
      </div>
      <button type="submit" class="btn btn-danger w-100 fw-bold py-2">
        <i class="bi bi-person-check me-2"></i>Register
      </button>
    </form>
    <p class="text-center mt-3 mb-0">
      Already have an account?
      <a href="{{ url_for('auth.login') }}" class="text-danger fw-semibold">Login</a>
    </p>
  </div>
</div>
{% endblock %}
